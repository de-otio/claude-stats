name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  test:
    name: Typecheck & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Typecheck all packages
        run: npx tsc --build --force

      - name: Run tests
        run: npx vitest run --coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

  build-extension:
    name: Build VS Code Extension
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build core package
        run: npm run build -w packages/core

      - name: Package VS Code extension
        run: npm run package:ext

      - name: Upload extension artifact
        uses: actions/upload-artifact@v4
        with:
          name: claude-stats-vscode-${{ github.sha }}
          path: extension/*.vsix

  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build -w packages/frontend

      - name: Upload frontend dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: packages/frontend/dist/
          retention-days: 1

  synth-cdk:
    name: CDK Synth
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build core package
        run: npm run build -w packages/core

      - name: Build infra package
        run: npm run build -w packages/infra

      - name: CDK Synth (verify template generation)
        run: npx cdk synth --app "node packages/infra/dist/bin/app.js" -c env=dev --no-staging
        env:
          CDK_DEFAULT_REGION: us-east-1

  deploy-dev:
    name: Deploy to Dev
    runs-on: ubuntu-latest
    needs: [build-frontend, synth-cdk]
    if: github.ref == 'refs/heads/master'
    environment: dev

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Deploy to dev (placeholder)
        run: echo "Deploy to dev — configure AWS credentials and run cdk deploy here"

  deploy-prod:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: deploy-dev
    if: github.ref == 'refs/heads/master'
    environment: production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Deploy to prod (placeholder)
        run: echo "Deploy to prod — configure AWS credentials and run cdk deploy here"
