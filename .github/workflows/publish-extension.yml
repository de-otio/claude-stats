name: Publish VS Code Extension

on:
  push:
    tags:
      - "ext-v*"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Package only; do not publish"
        type: boolean
        default: false

jobs:
  publish:
    name: Publish to VS Code Marketplace
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npx tsc --build --force

      - name: Run tests
        run: npx vitest run

      - name: Build and package extension
        run: npm run package:ext

      - name: Verify tag matches extension version
        if: startsWith(github.ref, 'refs/tags/ext-v')
        run: |
          tag_version="${GITHUB_REF_NAME#ext-v}"
          pkg_version=$(node -p "require('./extension/package.json').version")
          if [ "$tag_version" != "$pkg_version" ]; then
            echo "::error::Tag version ($tag_version) does not match extension/package.json version ($pkg_version)"
            exit 1
          fi

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v7
        with:
          name: claude-stats-vscode-${{ github.ref_name }}
          path: extension/*.vsix
          retention-days: 30

      - name: Publish to VS Code Marketplace
        if: github.event_name == 'push' || inputs.dry_run != true
        working-directory: extension
        env:
          VSCE_PAT: ${{ secrets.VSCODE_MARKETPLACE_PAT }}
        run: npx @vscode/vsce publish --packagePath claude-stats-vscode-*.vsix
