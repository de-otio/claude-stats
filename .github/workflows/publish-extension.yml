name: Publish VS Code Extension

on:
  push:
    tags:
      - "ext-v*"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Package only; do not publish"
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  package:
    name: Package VSIX (${{ matrix.target }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: darwin-arm64
            os: macos-latest
          - target: linux-x64
            os: ubuntu-latest
          - target: linux-arm64
            # ARM64 hosted runner; if unavailable on the project's plan,
            # this leg fails fast and can be temporarily removed.
            os: ubuntu-24.04-arm
          - target: win32-x64
            os: windows-latest
          - target: win32-arm64
            # Windows ARM hosted runner; same caveat as above.
            os: windows-11-arm

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build core package
        # @claude-stats/core has TS + JSON-locale outputs that the per-leg
        # esbuild step resolves via `exports`; without this it fails to
        # find ./dist/locales/<locale>/cli.json on every non-typecheck leg.
        run: npm run build -w packages/core

      - name: Typecheck (Linux x64 only — same answer on every leg)
        if: matrix.target == 'linux-x64'
        run: npx tsc --build --force

      - name: Run tests (Linux x64 only)
        if: matrix.target == 'linux-x64'
        run: npx vitest run

      # Cache the model file across legs and across runs. The cache key is
      # the sha256 of embeddings.ts so any rotation of MODEL_SHA256/_URL
      # invalidates the cache automatically. Per-target legs share the
      # same model file.
      - name: Cache embedding model
        id: cache-model
        uses: actions/cache@v4
        with:
          path: extension/media/embed-model
          key: embed-model-${{ hashFiles('packages/cli/src/recap/embeddings.ts') }}

      - name: Fetch embedding model
        if: steps.cache-model.outputs.cache-hit != 'true'
        run: node scripts/fetch-embedding-model.mjs

      - name: Build and package per-target VSIX
        run: node scripts/package-vsix.mjs --target=${{ matrix.target }}

      - name: Verify tag matches extension version
        if: startsWith(github.ref, 'refs/tags/ext-v') && matrix.target == 'linux-x64'
        shell: bash
        run: |
          tag_version="${GITHUB_REF_NAME#ext-v}"
          pkg_version=$(node -p "require('./extension/package.json').version")
          if [ "$tag_version" != "$pkg_version" ]; then
            echo "::error::Tag version ($tag_version) does not match extension/package.json version ($pkg_version)"
            exit 1
          fi

      - name: Smoke-check VSIX contents
        run: node scripts/verify-vsix.mjs --target=${{ matrix.target }}

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v7
        with:
          name: claude-stats-vscode-${{ matrix.target }}
          path: extension/*.vsix
          retention-days: 30

  publish:
    name: Publish to VS Code Marketplace
    needs: package
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || inputs.dry_run != true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Download all per-target VSIXes
        uses: actions/download-artifact@v7
        with:
          path: artifacts
          pattern: claude-stats-vscode-*

      - name: List downloaded VSIXes
        run: find artifacts -name '*.vsix' -print

      - name: Publish each per-target VSIX
        env:
          VSCE_PAT: ${{ secrets.VSCODE_MARKETPLACE_PAT }}
        run: |
          set -euo pipefail
          for vsix in $(find artifacts -name '*.vsix'); do
            echo "::group::Publishing $vsix"
            npx @vscode/vsce publish --packagePath "$vsix"
            echo "::endgroup::"
          done

  release:
    name: Create GitHub Release
    needs: publish
    runs-on: ubuntu-latest
    # Only on tag pushes — workflow_dispatch never makes a Release.
    if: startsWith(github.ref, 'refs/tags/ext-v')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Download all per-target VSIXes
        uses: actions/download-artifact@v7
        with:
          path: artifacts
          pattern: claude-stats-vscode-*

      - name: Flatten VSIX layout
        run: |
          set -euo pipefail
          mkdir -p release-assets
          find artifacts -name '*.vsix' -exec cp {} release-assets/ \;
          ls -la release-assets

      - name: Extract changelog section for this tag
        id: notes
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#ext-v}"
          node scripts/extract-changelog.mjs "$version" > release-notes.md
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          version="${{ steps.notes.outputs.version }}"
          tag="${GITHUB_REF_NAME}"
          # Idempotent: if a release already exists at this tag, upload
          # the VSIXes to it (clobber) and skip the create step.
          if gh release view "$tag" >/dev/null 2>&1; then
            echo "Release $tag already exists; uploading assets with --clobber"
            gh release upload "$tag" release-assets/*.vsix --clobber
          else
            gh release create "$tag" \
              --title "VS Code Extension $version" \
              --notes-file release-notes.md \
              release-assets/*.vsix
          fi
